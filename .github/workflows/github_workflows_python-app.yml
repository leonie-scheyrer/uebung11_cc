name: Python Checks and Security

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *' # Täglich um Mitternacht
  workflow_dispatch: # Ermöglicht manuelles Auslösen

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff bandit pip-audit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Compile all files (Syntax check)
      run: python -m compileall .

    - name: Lint with ruff
      run: ruff check .

    - name: Run Tests
      run: python -m unittest discover tests

    - name: Security Check with bandit
      run: bandit -r . 

    - name: Dependency Audit
      run: pip-audit -r requirements.txt -f json -o audit.json
      continue-on-error: true # Damit der Workflow nicht stoppt, falls Schwachstellen gefunden werden (für den Bericht)

    - name: Upload Audit Report
      uses: actions/upload-artifact@v4
      with:
        name: security-audit-report
        path: audit.json
name: Ubung 11 - GitHub Actions

on: {}
  # push:
  #   branches: [ "main", "master" ]
  # schedule:
  #   - cron: '0 12 * * 1' # Zeitgesteuert: Jeden Montag um 12:00
  # workflow_dispatch: # Manuell auslösbar über die Website

jobs:
  quality-and-security:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Tools & Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff bandit pip-audit
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: 1. Compile Check
      run: python -m compileall .

    - name: 2. Linting (Ruff)
      run: ruff check .
      continue-on-error: true # Damit man den Bericht trotz Fehlern sieht

    - name: 3. Run Automated Tests
      run: python -m unittest discover tests

    - name: 4. Security Check (Bandit)
      run: bandit -r .
      continue-on-error: true

    - name: 5. Dependency Audit (pip-audit)
      run: pip-audit -r requirements.txt -f json -o audit.json
      continue-on-error: true

    - name: Upload Audit Artifact
      uses: actions/upload-artifact@v4
      with:
        name: audit-report
        path: audit.json
